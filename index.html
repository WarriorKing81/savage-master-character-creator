<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savage Worlds Character Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Mobile Header (hidden on desktop) -->
    <header class="mobile-header" id="mobileHeader">
      <img src="logo.png" alt="" class="mobile-logo">
      <span class="mobile-title" id="mobileTitle">Savage Master</span>
      <button class="mobile-summary-btn" id="summaryToggle" onclick="app.toggleMobileSummary()">Summary</button>
    </header>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-wrap">
          <img src="logo.png" alt="Savage Master Character Creation" class="logo-img">
        </div>
      </div>
      <ul class="steps" id="stepNav"></ul>
      <div style="margin-top:auto; padding:1rem; border-top:1px solid var(--border);">
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportFoundryVTT()">Export Foundry VTT</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportRoll20()">Export Roll20</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportJSON()">Export JSON</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.resetCharacter()">New Character</button>
        <button class="btn btn-sm btn-store" style="width:100%;" onclick="app.showStorePage()">Official Content</button>
        <div class="sidebar-credit">
          Created by Visionary Studios 101<br>
          <span class="credit-name">"WarriorKing"</span>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="content" id="mainContent"></main>

    <!-- Summary Panel -->
    <aside class="summary-panel" id="summaryPanel"></aside>

    <!-- Mobile Bottom Nav (hidden on desktop) -->
    <nav class="mobile-nav" id="mobileNav"></nav>

    <!-- Summary Overlay (for mobile drawer) -->
    <div class="summary-overlay" id="summaryOverlay" onclick="app.toggleMobileSummary()"></div>
  </div>

  <script src="data.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
