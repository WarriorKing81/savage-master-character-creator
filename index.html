<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Savage Master - Character Creator</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1510">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Savage Master">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png">

  <!-- Meta -->
  <meta name="description" content="Create characters for Savage Worlds settings including Deadlands, Rifts, 50 Fathoms, and Pathfinder.">
  <meta name="author" content="Visionary Studios 101">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Mobile Header (hidden on desktop) -->
    <header class="mobile-header" id="mobileHeader">
      <img src="logo.png" alt="" class="mobile-logo">
      <span class="mobile-title" id="mobileTitle">Savage Master</span>
      <button class="mobile-summary-btn" id="summaryToggle" onclick="app.toggleMobileSummary()">Summary</button>
    </header>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-wrap">
          <img src="logo.png" alt="Savage Master Character Creation" class="logo-img">
        </div>
      </div>
      <ul class="steps" id="stepNav"></ul>
      <div style="margin-top:auto; padding:1rem; border-top:1px solid var(--border);">
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportFoundryVTT()">Export Foundry VTT</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportRoll20()">Export Roll20</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.exportJSON()">Export JSON</button>
        <button class="btn btn-sm" style="width:100%; margin-bottom:0.4rem;" onclick="app.resetCharacter()">New Character</button>
        <button class="btn btn-sm btn-store" style="width:100%;" onclick="app.showStorePage()">Official Content</button>
        <div class="sidebar-credit">
          Created by Visionary Studios 101<br>
          <span class="credit-name">"WarriorKing"</span>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="content" id="mainContent"></main>

    <!-- Summary Panel -->
    <aside class="summary-panel" id="summaryPanel"></aside>

    <!-- Mobile Bottom Nav (hidden on desktop) -->
    <nav class="mobile-nav" id="mobileNav"></nav>

    <!-- Summary Overlay (for mobile drawer) -->
    <div class="summary-overlay" id="summaryOverlay" onclick="app.toggleMobileSummary()"></div>
  </div>

  <script src="data.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
